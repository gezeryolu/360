<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gezeryolu 360 Ultra Zoom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100%; }
        
        /* Buton Grubu */
        #controls {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            display: flex; gap: 15px; background: rgba(255,255,255,0.1);
            padding: 12px 25px; border-radius: 50px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
        }
        button {
            background: #fff; border: none; padding: 10px 20px;
            border-radius: 25px; cursor: pointer; font-weight: bold;
            color: #333; transition: all 0.3s ease;
        }
        button:hover { background: #00bcd4; color: white; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="panorama"></div>

<div id="controls">
    <button onclick="loadScene('foto1')">Mekan 1</button>
    <button onclick="loadScene('foto2')">Mekan 2</button>
    <button onclick="loadScene('foto3')">Mekan 3</button>
</div>

<script>
    const viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "foto1",
            "author": "Gezeryolu",
            "sceneFadeDuration": 1200,
            "autoLoad": true,
            "compass": true, // Pusulayı aktif eder
            "hfov": 100,      // Başlangıç görüş açısı (Normal)
            "minHfov": 5,     // ULTRA ZOOM: 5'e kadar yaklaştırır (Normali 50'dir)
            "maxHfov": 120    // Uzaklaşma sınırı
        },
        "scenes": {
            "foto1": {
                "type": "equirectangular",
                "panorama": "gezer360/foto1/panorama.jpg" // Resim adını kontrol et!
            },
            "foto2": {
                "type": "equirectangular",
                "panorama": "gezer360/foto2/panorama.jpg"
            },
            "foto3": {
                "type": "equirectangular",
                "panorama": "gezer360/foto3/panorama.jpg"
            }
        }
    });

    function loadScene(id) {
        viewer.loadScene(id);
    }
</script>

</body>
</html>
