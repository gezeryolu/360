<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>gezeryolu GALERİ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000; position: fixed; 
        }
        
        #panorama { width: 100%; height: 100vh; }
        
        #title {
            position: absolute; top: 15px; right: 15px; color: white;
            background: rgba(0,0,0,0.7); padding: 6px 16px;
            border-radius: 20px; z-index: 2000; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        /* ALT PANEL YERLEŞİMİ */
        #bottom-controls {
            position: absolute; bottom: 25px; right: 25px;
            z-index: 4000; display: flex; align-items: flex-end; gap: 12px;
        }

        .action-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(0,0,0,0.7); color: white; 
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer; font-size: 22px; display: flex;
            align-items: center; justify-content: center;
            backdrop-filter: blur(5px); transition: 0.3s;
        }

        /* MAVİ ARTI MENÜSÜ */
        #menu-container { display: flex; flex-direction: column-reverse; align-items: flex-end; gap: 12px; }

        #menu-trigger {
            width: 60px; height: 60px; border-radius: 50%;
            background: #007bff; color: white; border: 2px solid rgba(255,255,255,0.4);
            cursor: pointer; font-size: 30px; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #controls {
            display: flex; flex-direction: column;
            gap: 8px; opacity: 0; visibility: hidden;
            transform: translateY(20px); transition: all 0.4s ease;
            background: rgba(0,0,0,0.8); padding: 12px; border-radius: 18px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
        }

        #menu-container.active #controls { opacity: 1; visibility: visible; transform: translateY(0); }
        #menu-container.active #menu-trigger { transform: rotate(45deg); background: #ff4757; }

        /* BİLGİ KUTUSU */
        #info-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 10px; display: none; z-index: 5000; font-family: sans-serif;
        }

        .photo-btn {
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px; cursor: pointer; border-radius: 12px; font-size: 14px;
        }
        .photo-btn.active { background: #007bff; }

        /* GEREKSİZLERİ GİZLE */
        .pnlm-zoom-controls, .pnlm-fullscreen-ctrl, .pnlm-orientation-button, .pnlm-compass { display: none !important; }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    <div id="info-box"></div>
    
    <div id="bottom-controls">
        <button class="action-btn" onclick="handleFS()">⛶</button>
        
        <button class="action-btn" id="gyro-btn" onclick="handleGyro()">🧭</button>
        
        <div id="menu-container">
            <button id="menu-trigger" onclick="toggleMenu()">+</button>
            <div id="controls">
                <button class="photo-btn active" onclick="loadScene('foto1', this)">gezeryolu1</button>
                <button class="photo-btn" onclick="loadScene('foto2', this)">gezeryolu2</button>
                <button class="photo-btn" onclick="loadScene('foto3', this)">gezeryolu3</button>
                <button class="photo-btn" onclick="loadScene('foto4', this)">gezeryolu4</button>
                <button class="photo-btn" onclick="loadScene('foto5', this)">gezeryolu5</button>
                <button class="photo-btn" onclick="loadScene('foto6', this)">gezeryolu6</button>
            </div>
        </div>
    </div>

    <div id="panorama"></div>

    <script>
        function toggleMenu() { document.getElementById('menu-container').classList.toggle('active'); }

        function showInfo(msg) {
            const box = document.getElementById('info-box');
            box.innerText = msg; box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2000);
        }

        function handleFS() {
            viewer.toggleFullscreen();
            showInfo("Tam Ekran Modu Değiştirildi");
        }

        function handleGyro() {
            const isOff = viewer.getOrientationOnByDefault();
            if(isOff) {
                viewer.stopOrientation();
                document.getElementById('gyro-btn').style.background = 'rgba(0,0,0,0.7)';
                showInfo("Jiroskop Kapalı (Sabit)");
            } else {
                viewer.startOrientation();
                document.getElementById('gyro-btn').style.background = '#28a745';
                showInfo("Jiroskop Açık (Hareketli)");
            }
        }

        var commonConfig = {
            "type": "multires", "autoLoad": true, "hfov": 100, "minHfov": 50, "maxHfov": 120,
            "showFullscreenCtrl": false, "showZoomCtrl": false, "orientationOnByDefault": false, "compass": true
        };

        var viewer = pannellum.viewer('panorama', {
            "default": { "firstScene": "foto1", "sceneFadeDuration": 1200 },
            "scenes": {
                "foto1": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto1", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto2": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto2", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto3": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto3", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto4": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto4", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto5": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto5", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto6": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto6", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig)
            }
        });

        function loadScene(id, btnElement) {
            viewer.loadScene(id);
            document.querySelectorAll('.photo-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
