<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>gezeryolu GALERİ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; 
            width: 100%;
            overflow: hidden; background: #000; position: fixed; 
        }
        
        #panorama { 
            width: 100%; 
            height: 100dvh; 
            position: relative; 
        }
        
        #title {
            position: absolute; top: 15px; right: 15px; color: white;
            background: rgba(0,0,0,0.7); padding: 6px 16px;
            border-radius: 20px; z-index: 9999; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        /* SAĞ ALT KONTROL GRUBU */
        #bottom-controls {
            position: absolute !important;
            bottom: calc(20px + env(safe-area-inset-bottom)) !important; 
            right: 20px !important;
            display: flex !important;
            flex-direction: row-reverse !important; 
            align-items: center !important;
            gap: 12px !important;
            z-index: 10000 !important;
            pointer-events: none;
        }

        #menu-container, .pnlm-controls-container {
            pointer-events: auto;
        }

        #menu-container {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 12px;
        }

        #menu-trigger {
            width: 50px; height: 50px; border-radius: 50%;
            background: #007bff; color: white; border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer; font-size: 24px; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #controls {
            display: flex; flex-direction: column; 
            gap: 8px; opacity: 0; visibility: hidden;
            transform: translateY(20px); 
            transition: all 0.4s ease;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            position: absolute;
            bottom: 65px;
        }

        #menu-container.active #controls {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        #menu-container.active #menu-trigger {
            transform: rotate(45deg); background: #ff4757;
        }

        .photo-btn {
            background: rgba(255, 255, 255, 0.1); color: white; 
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 18px; cursor: pointer; border-radius: 12px; 
            font-size: 14px; transition: 0.3s; white-space: nowrap;
            text-align: center; min-width: 100px;
        }

        .photo-btn.active { background: #007bff; border-color: #fff; font-weight: bold; }

        /* PANNELLUM KONTROLLERİ - ŞEKLİ BOZULMADI */
        .pnlm-controls-container {
            position: static !important; 
            display: flex !important;
            flex-direction: row-reverse !important;
            gap: 8px !important;
            background: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .pnlm-fullscreen-toggle-button, .pnlm-orientation-button {
            position: static !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    
    <div id="panorama">
        <div id="bottom-controls">
            <div id="menu-container">
                <button id="menu-trigger" onclick="toggleMenu()">+</button>
                <div id="controls">
                    <button class="photo-btn active" onclick="loadScene('foto1', this)">Kiya</button>
                    <button class="photo-btn" onclick="loadScene('foto2', this)">Gırkı Hındırışı</button>
                    <button class="photo-btn" onclick="loadScene('foto3', this)">Bişi Hırçı</button>
                    <button class="photo-btn" onclick="loadScene('foto4', this)">Seru Banyı</button>
                    <button class="photo-btn" onclick="loadScene('foto5', this)">Hevıza Bişi Hırçı</button>
                    <button class="photo-btn" onclick="loadScene('foto6', this)">Bın BerıSpi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menu-container').classList.toggle('active');
        }

        var commonConfig = {
            "type": "multires",
            "autoLoad": true,
            "hfov": 100,
            "minHfov": 10,
            "maxHfov": 120,
            "mouseZoom": true,
            "showFullscreenCtrl": true,
            "showZoomCtrl": false,
            "orientationOnByDefault": false,
            "compass": false
        };

        var viewer = pannellum.viewer('panorama', {
            "default": {
                "firstScene": "foto1",
                "sceneFadeDuration": 1200
            },
            "scenes": {
                "foto1": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto1", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto2": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto2", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto3": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto3", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto4": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto4", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto5": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto5", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto6": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto6", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig)
            }
        });

        function moveControls() {
            var pnlmControls = document.querySelector('.pnlm-controls-container');
            var customControls = document.getElementById('bottom-controls');
            if (pnlmControls && customControls) {
                if (pnlmControls.parentElement !== customControls) {
                    customControls.appendChild(pnlmControls);
                }
            }
        }

        // 1. Sahne yüklenince çalıştır
        viewer.on('load', moveControls);
        
        // 2. İlk açılışta butonlar oluşur oluşmaz yakalamak için kısa aralıklı kontrol
        var checkExist = setInterval(function() {
            var pnlmControls = document.querySelector('.pnlm-controls-container');
            if (pnlmControls) {
                moveControls();
                clearInterval(checkExist);
            }
        }, 100); 

        window.addEventListener('resize', moveControls);
        document.addEventListener('fullscreenchange', moveControls);

        const observer = new MutationObserver(moveControls);
        observer.observe(document.getElementById('panorama'), { childList: true, subtree: true });

        function loadScene(id, btnElement) {
            viewer.loadScene(id);
            document.querySelectorAll('.photo-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
