<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gezeryolu GALERİ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        
        /* BAŞLIK */
        #title {
            position: absolute; top: 15px; right: 15px; color: white;
            background: rgba(0,0,0,0.8); padding: 10px 20px;
            border-radius: 12px; z-index: 1000; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); /* Arkayı hafif bulanıklaştırır, daha modern durur */
        }

        /* YENİ KAYDIRILABİLİR BUTON KUTUSU */
        #controls-container {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); /* Ortalar */
            z-index: 1000; width: 90%; max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        #controls {
            display: flex; gap: 10px; overflow-x: auto; /* Yatay kaydırma */
            scrollbar-width: none; /* Firefox için scroll gizle */
            -ms-overflow-style: none; /* IE için scroll gizle */
            padding: 5px;
        }

        #controls::-webkit-scrollbar { display: none; } /* Chrome/Safari için scroll gizle */

        .photo-btn {
            flex: 0 0 auto; /* Butonların daralmasını engeller */
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; cursor: pointer; border-radius: 8px; font-size: 14px;
            transition: all 0.3s ease; white-space: nowrap;
        }

        .photo-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: white; }
        .photo-btn.active { background: #007bff; border-color: #007bff; box-shadow: 0 0 10px rgba(0,123,255,0.5); }

        /* NETLİK İÇİN CSS OPTİMİZASYONU */
        .pnlm-render-container {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    
    <div id="controls-container">
        <div id="controls">
            <button class="photo-btn" onclick="loadScene('foto1', this)">Foto 1</button>
            <button class="photo-btn" onclick="loadScene('foto2', this)">Foto 2</button>
            <button class="photo-btn" onclick="loadScene('foto3', this)">Foto 3</button>
            <button class="photo-btn" onclick="loadScene('foto4', this)">Foto 4</button>
            <button class="photo-btn active" onclick="loadScene('foto5', this)">Foto 5</button>
            <button class="photo-btn" onclick="loadScene('foto6', this)">Foto 6</button>
        </div>
    </div>

    <div id="panorama"></div>

    <script>
        var commonConfig = {
            "type": "multires",
            "autoLoad": true,
            "hfov": 100,
            "minHfov": 30, // Çok fazla uzaklaşıp bozulmayı engeller
            "maxHfov": 120,
            "mouseZoom": true,
            "showFullscreenCtrl": true,
            "showZoomCtrl": true,
            "orientationOnByDefault": true,
            "dynamicUpdate": true, // Netlik için önemli
            "friction": 0.1 // Daha yumuşak kayma hissi
        };

        var viewer = pannellum.viewer('panorama', {
            "default": {
                "firstScene": "foto5",
                "sceneFadeDuration": 1200
            },
            "scenes": {
                "foto1": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto1", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto2": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto2", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto3": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto3", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto4": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto4", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto5": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto5", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto6": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto6", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig)
            }
        });

        function loadScene(id, btnElement) {
            viewer.loadScene(id);
            // Tüm butonlardan active sınıfını kaldır
            document.querySelectorAll('.photo-btn').forEach(btn => btn.classList.remove('active'));
            // Tıklanan butona active sınıfını ekle
            btnElement.classList.add('active');
            
            // Mobilde tıklanan butonu kutu içinde görünür alana kaydırır
            btnElement.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    </script>

</body>
</html>
