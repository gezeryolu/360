<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gezeryolu KAMERA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #panorama { width: 100%; height: 100vh; background: #f4f4f4; }
        #title {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.5); padding: 5px 15px;
            font-family: sans-serif; border-radius: 5px; z-index: 100;
        }

        /* TÜM ARAÇLARI SAĞ ALTTA TOPLAYAN ÖZEL CSS */
        
        /* 1. Zoom ve Tam Ekran Butonlarını Sağ Alta Al */
        .pnlm-controls {
            left: auto !important;
            right: 10px !important;
            top: auto !important;
            bottom: 10px !important;
            display: flex !important;
            flex-direction: column-reverse !important; /* Butonları dikey dizer */
            gap: 5px;
        }

        /* 2. Pusulayı Sağ Alta, Butonların Hemen Üstüne Al */
        .pnlm-compass {
            right: 15px !important;
            left: auto !important;
            top: auto !important;
            bottom: 120px !important; /* Butonların üzerine binmemesi için pay */
        }

        /* Butonların görünümünü biraz daha modern yapalım */
        .pnlm-control {
            background-color: rgba(0, 0, 0, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 6px !important;
        }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "type": "multires",
            "multiRes": {
                "basePath": "https://gezeryolu.github.io/360/foto5",
                "path": "/%l/%s%y_%x",
                "fallbackPath": "/fallback/%s",
                "extension": "jpg",
                "tileResolution": 512,
                "maxLevel": 5,
                "cubeResolution": 8192
            },
            "autoLoad": true,
            /* ZOOM AYARLARI - Maksimum Yakınlaştırma */
            "hfov": 100,
            "minHfov": 2,   /* En yüksek zoom seviyesi, inanılmaz yaklaşır */
            "maxHfov": 120,
            
            /* DİĞER ÖZELLİKLER */
            "autoRotate": -1,        /* Çok yavaş ve estetik bir dönüş */
            "compass": true,         /* Pusula (Sağ altta dikey hizada) */
            "mouseZoom": true,
            "orientationOnByDefault": true, /* Jiroskop desteği */
            "showFullscreenCtrl": true,
            "showZoomCtrl": true
        });
    </script>

</body>
</html>
