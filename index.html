<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gezeryolu Foto 5 Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
    pannellum.viewer('panorama', {
        "type": "multires",
        "multiRes": {
            "basePath": "foto5", // foto5 klasörünü baz alıyoruz
            "path": "/%l/%s%y_%x", // Klasör/YönY_X formatı (Örn: 1/f0_0)
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 5, // config.json'daki değerin
            "cubeResolution": 8192
        },
        "autoLoad": true,
        "hfov": 100.0,
        "compass": true,
        "title": "Gezeryolu Foto 5 - Yüksek Kalite"
    });
</script>

</body>
</html>
