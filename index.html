<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gezeryolu KAMERA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #panorama { width: 100%; height: 100vh; background: #f4f4f4; }
        #title {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.5); padding: 5px 15px;
            font-family: sans-serif; border-radius: 5px; z-index: 100;
        }

        /* ARAÇLARI SAĞ ALT KÖŞEYE DİKEY TAŞIMA */
        .pnlm-controls {
            left: auto !important;
            right: 10px !important;
            bottom: 10px !important;
            top: auto !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 2px;
        }
        /* Butonları biraz daha belirgin yapalım */
        .pnlm-control {
            background-color: rgba(0, 0, 0, 0.6) !important;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "type": "multires",
            "multiRes": {
                "basePath": "https://gezeryolu.github.io/360/foto5",
                "path": "/%l/%s%y_%x",
                "fallbackPath": "/fallback/%s",
                "extension": "jpg",
                "tileResolution": 512,
                "maxLevel": 5,
                "cubeResolution": 8192
            },
            "autoLoad": true,
            /* ZOOM AYARLARI */
            "hfov": 100,
            "minHfov": 5,   /* Zoom kapasitesini 10'dan 5'e çekerek daha da artırdım */
            "maxHfov": 120,
            
            /* YENİ VE DAHA İYİ ÖZELLİKLER */
            "autoRotate": -2,         /* Sayfa açıldığında manzara yavaşça döner */
            "compass": true,          /* Nereye baktığını anlaman için pusula ekler */
            "mouseZoom": true,        /* Mouse tekerleği ile zoom yapmanı sağlar */
            "orientationOnByDefault": true, /* Telefondan bakarken telefonu çevirince manzara döner */
            "showFullscreenCtrl": true, /* Tam ekran butonu */
            "showZoomCtrl": true       /* Zoom butonlarını gösterir */
        });
    </script>

</body>
</html>
