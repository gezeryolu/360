<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gezeryolu KAMERA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #panorama { width: 100%; height: 100vh; background: #f4f4f4; }
        
        /* BAŞLIK SOL ÜSTTE SABİT */
        #title {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.5); padding: 5px 15px;
            font-family: sans-serif; border-radius: 5px; z-index: 100;
        }

        /* TÜM ARAÇLARI SAĞ ALTA TAŞIYAN GRUP */
        .pnlm-ui .pnlm-controls {
            left: auto !important;
            right: 10px !important;
            top: auto !important;
            bottom: 10px !important;
            display: flex !important;
            flex-direction: column-reverse !important; /* Zoom ve Tam Ekran butonlarını üst üste dizer */
            gap: 5px;
        }

        /* PUSULAYI DA SAĞ ALTA (BUTONLARIN ÜSTÜNE) AL */
        .pnlm-compass {
            left: auto !important;
            right: 15px !important;
            top: auto !important;
            bottom: 110px !important; /* Butonlarla çakışmaması için mesafe */
        }

        /* Butonların şıklığı için küçük dokunuş */
        .pnlm-control {
            background-color: rgba(0, 0, 0, 0.7) !important;
        }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "type": "multires",
            "multiRes": {
                "basePath": "https://gezeryolu.github.io/360/foto5",
                "path": "/%l/%s%y_%x",
                "fallbackPath": "/fallback/%s",
                "extension": "jpg",
                "tileResolution": 512,
                "maxLevel": 5,
                "cubeResolution": 8192
            },
            "autoLoad": true,
            "hfov": 100,      /* Netlik için başlangıç açısı (senin orijinal değerin) */
            "minHfov": 5,      /* Zoom seviyesi (çok daha fazla yaklaşabilirsin) */
            "maxHfov": 120,
            
            /* EK ARAÇLAR */
            "compass": true,
            "showFullscreenCtrl": true,
            "showZoomCtrl": true,
            "mouseZoom": true,
            "orientationOnByDefault": true
        });
    </script>

</body>
</html>
