<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gezeryolu 360 Tur</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100%; }
        #controls {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            display: flex; gap: 15px; background: rgba(0,0,0,0.6);
            padding: 12px 20px; border-radius: 50px; backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            background: #fff; border: none; padding: 10px 22px;
            border-radius: 25px; cursor: pointer; font-weight: bold;
            transition: 0.3s; color: #222;
        }
        button:hover { background: #00bcd4; color: white; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="panorama"></div>
<div id="controls">
    <button onclick="loadScene('foto1')">Mekan 1</button>
    <button onclick="loadScene('foto2')">Mekan 2</button>
    <button onclick="loadScene('foto3')">Mekan 3</button>
</div>

<script>
    const viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "foto1",
            "author": "Gezeryolu",
            "autoLoad": true,
            "compass": true,
            "hfov": 100,
            "minHfov": 10
        },
        "scenes": {
            "foto1": {
                "type": "cubemap",
                "cubeMap": [
                    "gezer360/foto1/f1_1.jpg",
                    "gezer360/foto1/r1_1.jpg",
                    "gezer360/foto1/b1_1.jpg",
                    "gezer360/foto1/l1_1.jpg",
                    "gezer360/foto1/u1_1.jpg",
                    "gezer360/foto1/d1_1.jpg"
                ]
            },
            "foto2": {
                "type": "cubemap",
                "cubeMap": [
                    "gezer360/foto2/f1_1.jpg",
                    "gezer360/foto2/r1_1.jpg",
                    "gezer360/foto2/b1_1.jpg",
                    "gezer360/foto2/l1_1.jpg",
                    "gezer360/foto2/u1_1.jpg",
                    "gezer360/foto2/d1_1.jpg"
                ]
            },
            "foto3": {
                "type": "cubemap",
                "cubeMap": [
                    "gezer360/foto3/f1_1.jpg",
                    "gezer360/foto3/r1_1.jpg",
                    "gezer360/foto3/b1_1.jpg",
                    "gezer360/foto3/l1_1.jpg",
                    "gezer360/foto3/u1_1.jpg",
                    "gezer360/foto3/d1_1.jpg"
                ]
            }
        }
    });

    function loadScene(id) {
        viewer.loadScene(id);
    }
</script>
</body>
</html>
