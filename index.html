<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gezeryolu GALERİ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #panorama { width: 100%; height: 100vh; background: #1a1a1a; }
        
        /* BAŞLIK - KESİN OLARAK SAĞ ÜSTTE */
        #title {
            position: absolute; top: 15px; right: 15px; color: white;
            background: rgba(0,0,0,0.7); padding: 8px 20px;
            border-radius: 8px; z-index: 1000; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* GALERİ SEÇİM MENÜSÜ - SOL ALTTA */
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            z-index: 1000; display: flex; flex-wrap: wrap; gap: 8px;
            max-width: 300px;
        }

        .photo-btn {
            background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid white;
            padding: 8px 12px; cursor: pointer; border-radius: 5px; font-size: 13px;
            transition: 0.3s;
        }

        .photo-btn:hover { background: white; color: black; }
        .photo-btn.active { background: #007bff; border-color: #007bff; }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    
    <div id="controls">
        <button class="photo-btn" onclick="loadScene('foto1')">Foto 1</button>
        <button class="photo-btn" onclick="loadScene('foto2')">Foto 2</button>
        <button class="photo-btn" onclick="loadScene('foto3')">Foto 3</button>
        <button class="photo-btn" onclick="loadScene('foto4')">Foto 4</button>
        <button class="photo-btn active" onclick="loadScene('foto5')">Foto 5</button>
        <button class="photo-btn" onclick="loadScene('foto6')">Foto 6</button>
    </div>

    <div id="panorama"></div>

    <script>
        // Görünüm Ayarları (Tüm fotoğraflar için ortak)
        var commonConfig = {
            "type": "multires",
            "autoLoad": true,
            "hfov": 100,
            "minHfov": 5,
            "maxHfov": 120,
            "mouseZoom": true,
            "showFullscreenCtrl": true,
            "showZoomCtrl": true,
            "orientationOnByDefault": true
        };

        var viewer = pannellum.viewer('panorama', {
            "default": {
                "firstScene": "foto5", // Başlangıçta foto5 açılır
                "sceneFadeDuration": 1000
            },
            "scenes": {
                "foto1": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto1", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto2": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto2", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto3": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto3", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto4": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto4", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto5": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto5", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto6": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto6", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig)
            }
        });

        function loadScene(id) {
            viewer.loadScene(id);
            // Buton aktiflik durumunu güncelle
            document.querySelectorAll('.photo-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
