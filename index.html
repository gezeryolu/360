<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gezeryolu GALERİ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        
        #title {
            position: absolute; top: 10px; right: 10px; color: white;
            background: rgba(0,0,0,0.6); padding: 5px 15px;
            border-radius: 20px; z-index: 1000; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* MİNİMALİST MENÜ YAPISI */
        #menu-container {
            position: absolute; bottom: 20px; left: 20px;
            z-index: 1000; display: flex; align-items: center; gap: 10px;
        }

        /* ANA TETİKLEYİCİ BUTON (PARMAKLA DOKUNULACAK KISIM) */
        #menu-trigger {
            width: 45px; height: 45px; border-radius: 50%;
            background: #007bff; color: white; border: none;
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease;
        }

        /* FOTOĞRAF LİSTESİ - BAŞLANGIÇTA GİZLİ */
        #controls {
            display: flex; gap: 8px; opacity: 0; visibility: hidden;
            transform: translateX(-20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        /* MENÜ AÇIKKENKİ HALİ */
        #menu-container.active #controls {
            opacity: 1; visibility: visible; transform: translateX(0);
        }

        #menu-container.active #menu-trigger { transform: rotate(45deg); background: #444; }

        .photo-btn {
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.4);
            padding: 8px 15px; cursor: pointer; border-radius: 8px; font-size: 13px;
            transition: 0.3s; white-space: nowrap;
        }

        .photo-btn.active { background: #007bff; border-color: #007bff; }

        /* Netlik için render iyileştirmesi */
        .pnlm-render-container { image-rendering: -webkit-optimize-contrast; }
    </style>
</head>
<body>

    <div id="title">gezeryolu KAMERA</div>
    
    <div id="menu-container">
        <button id="menu-trigger" onclick="toggleMenu()">+</button>
        
        <div id="controls">
            <button class="photo-btn active" onclick="loadScene('foto1', this)">gezeryolu1</button>
            <button class="photo-btn" onclick="loadScene('foto2', this)">gezeryolu2</button>
            <button class="photo-btn" onclick="loadScene('foto3', this)">gezeryolu3</button>
            <button class="photo-btn" onclick="loadScene('foto4', this)">gezeryolu4</button>
            <button class="photo-btn" onclick="loadScene('foto5', this)">gezeryolu5</button>
            <button class="photo-btn" onclick="loadScene('foto6', this)">gezeryolu6</button>
        </div>
    </div>

    <div id="panorama"></div>

    <script>
        function toggleMenu() {
            document.getElementById('menu-container').classList.toggle('active');
        }

        var commonConfig = {
            "type": "multires",
            "autoLoad": true,
            "hfov": 100,
            "minHfov": 30,
            "maxHfov": 120,
            "mouseZoom": true,
            "showFullscreenCtrl": true,
            "showZoomCtrl": false, // Alan kazanmak için zoom butonlarını kapattım
            "orientationOnByDefault": true
        };

        var viewer = pannellum.viewer('panorama', {
            "default": {
                "firstScene": "foto1", // İstediğin gibi Foto 1 ile başlıyor
                "sceneFadeDuration": 1000
            },
            "scenes": {
                "foto1": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto1", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto2": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto2", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto3": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto3", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto4": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto4", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto5": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto5", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig),
                "foto6": Object.assign({ "multiRes": { "basePath": "https://gezeryolu.github.io/360/foto6", "path": "/%l/%s%y_%x", "fallbackPath": "/fallback/%s", "extension": "jpg", "tileResolution": 512, "maxLevel": 5, "cubeResolution": 8192 } }, commonConfig)
            }
        });

        function loadScene(id, btnElement) {
            viewer.loadScene(id);
            document.querySelectorAll('.photo-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            // Fotoğraf seçilince menüyü otomatik kapatmak istersen:
            // toggleMenu(); 
        }
    </script>

</body>
</html>
